name: AI Content Factory
on:
  workflow_dispatch: # ปุ่มกดสั่งงานเองใน GitHub
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      
      - name: Install dependencies
        run: pip install google-generativeai tavily-python

      - name: Run AI Worker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python ai_worker.py

      - name: Install Node & Build Website
        run: |
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      # === ส่วนที่เชื่อม Discord ===
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚀 **AI รายงานตัว!** เขียนบทความเสร็จแล้วและอัปโหลดขึ้นเว็บเรียบร้อย ไปเช็กได้เลยที่ลิงก์ GitHub Pages ของลูกพี่ครับ!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
