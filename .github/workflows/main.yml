name: AI Content Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions: # เพิ่มสิทธิ์ให้หุ่นยนต์ตรงๆ ในโค้ดเลย
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # สร้างโฟลเดอร์ที่จำเป็นให้ก่อนเลย กันเหนียว
      - name: Ensure Directories Exist
        run: mkdir -p src/pages src/content

      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      
      - name: Install dependencies
        run: pip install google-generativeai tavily-python

      - name: Run AI Worker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python ai_worker.py

      - name: Install Node & Build Website
        run: |
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Send Discord Notification
        if: always() # ให้มันส่งบอกพี่ด้วยว่ามันพังหรือมันผ่าน
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "สถานะการทำงาน: ${{ job.status }} \nไปดู Log ได้ที่: https://github.com/${{ github.repository }}/actions"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
