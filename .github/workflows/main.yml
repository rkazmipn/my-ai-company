name: AI Content Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # แก้คำเตือน Node 20
    steps:
      - uses: actions/checkout@v4

      - name: 📋 Check Files (ตรวจเช็กไฟล์)
        run: |
          ls -R
          echo "เช็กว่ามีไฟล์ครบไหม..."
          [ -f ai_worker.py ] && echo "✅ ai_worker.py อยู่" || echo "❌ ai_worker.py หาย!"
          [ -f package.json ] && echo "✅ package.json อยู่" || echo "❌ package.json หาย!"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5 # อัปเดตเป็น v5
        with:
          python-version: '3.10'
      
      - name: 📦 Install Python Dependencies
        run: pip install google-generativeai tavily-python

      - name: 🤖 Run AI Worker (สมองเริ่มทำงาน)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python ai_worker.py

      - name: 🚀 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # ใช้ตัวล่าสุดตามคำเตือน

      - name: 🏗️ Build Website (อบขนมปัง)
        run: |
          npm install
          npm run build

      - name: 🌏 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # อัปเดตเป็น v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: 📢 Discord Alert
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "สถานะ: ${{ job.status }} \nเช็ก Log: https://github.com/${{ github.repository }}/actions"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
