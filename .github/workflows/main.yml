name: AI Content Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # ขยับเวอร์ชันตาม Log แนะนำ
      
      - name: 📦 Install Python Dependencies
        run: |
          pip install google-genai tavily-python 
          # เปลี่ยนจาก google-generativeai เป็น google-genai

      - name: 🤖 Run AI Worker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python ai_worker.py

      - name: 🏗️ Build & Deploy Website
        run: |
          npm install
          npm run build

      - name: 🌏 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: 📢 Discord Alert
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "สถานะ: ${{ job.status }} \nเช็กหน้าเว็บได้ที่นี่ครับลูกพี่!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
